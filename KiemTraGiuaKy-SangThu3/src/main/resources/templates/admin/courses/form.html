<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin - Course Form')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<main class="container py-4" style="max-width: 860px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0" th:text="${course.id == null} ? 'Create Course' : 'Edit Course'">Form</h1>
        <a class="btn btn-outline-secondary" th:href="@{/admin/courses}">Back</a>
    </div>

    <form class="card shadow-sm p-3"
          th:action="${course.id == null} ? @{/admin/courses/create} : @{/admin/courses/{id}/edit(id=${course.id})}"
          method="post" th:object="${course}">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Tên học phần</label>
                <input class="form-control" th:field="*{name}" required>
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label">Số tín chỉ</label>
                <input class="form-control" type="number" min="1" th:field="*{credits}" required>
            </div>
            <div class="col-12 col-md-8">
                <label class="form-label">Giảng viên</label>
                <input class="form-control" th:field="*{instructor}" required>
            </div>
            <div class="col-12">
                <label class="form-label">Hình ảnh (URL)</label>
                <input class="form-control" th:field="*{imageUrl}" placeholder="https://...">
                <div class="form-text">Để trống sẽ dùng ảnh mặc định.</div>
            </div>
        </div>
        <div class="mt-3 d-flex justify-content-end gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
        </div>
    </form>
</main>
</body>
</html>
