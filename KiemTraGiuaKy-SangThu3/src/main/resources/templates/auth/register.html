<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: navbar('')}"></div>

<main class="container py-5" style="max-width: 520px;">
    <h1 class="h3 mb-3">Đăng ký tài khoản sinh viên</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="@{/register}" class="card shadow-sm p-3">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" required minlength="3" maxlength="50" th:value="${username}">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" required th:value="${email}">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required minlength="4">
        </div>
        <button class="btn btn-primary w-100" type="submit">Create account</button>
    </form>

    <div class="mt-3 text-center">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </div>
</main>
</body>
</html>
