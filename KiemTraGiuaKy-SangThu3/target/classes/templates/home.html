<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<style>
    /* Làm đẹp thẻ card và ảnh */
    .card { transition: all 0.3s ease; border: none; border-radius: 12px; overflow: hidden; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    .card-img-top { background-color: #f0f2f5; }
    .pagination .page-link { border-radius: 5px; margin: 0 2px; color: #0d6efd; }
    .pagination .active .page-link { background-color: #0d6efd; border-color: #0d6efd; }
</style>
<body>
<div th:replace="~{fragments/navbar :: navbar(${q})}"></div>

<main class="container py-5">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row align-items-center mb-5">
        <div class="col-md-8">
            <h1 class="display-6 fw-bold text-dark mb-1">Danh sách học phần</h1>
            <p class="text-muted mb-0">
                <i class="bi bi-grid-3x3-gap"></i>
                Hiện có <strong class="text-primary" th:text="${coursePage.totalElements}">0</strong> học phần sẵn sàng đăng ký
            </p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <a class="btn btn-light border shadow-sm" th:href="@{/home}">
                <i class="bi bi-arrow-clockwise"></i> Làm mới danh sách
            </a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="c : ${coursePage.content}">
            <div class="card h-100 shadow-sm">
                <img class="card-img-top"
                     th:src="${c.imageUrl != null && !#strings.isEmpty(c.imageUrl)} ? ${c.imageUrl} : 'https://picsum.photos/seed/' + ${c.id} + '/600/360'"
                     alt="course thumbnail"
                     style="object-fit: cover; height: 200px; width: 100%;">

                <div class="card-body d-flex flex-column p-4">
                    <h5 class="card-title fw-bold text-truncate" th:title="${c.name}" th:text="${c.name}">Course Name</h5>
                    <div class="mb-4">
                        <div class="d-flex align-items-center mb-2">
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3" th:text="${c.credits} + ' Tín chỉ'"></span>
                        </div>
                        <p class="text-secondary small mb-0">
                            Giảng viên: <strong class="text-dark" th:text="${c.instructor}">instructor</strong>
                        </p>
                    </div>

                    <div class="mt-auto d-grid gap-2">
                        <form sec:authorize="hasRole('STUDENT')" th:action="@{/enroll/{id}(id=${c.id})}" method="post">
                            <button class="btn btn-primary fw-bold w-100" type="submit">Đăng ký ngay</button>
                        </form>
                        <a sec:authorize="isAnonymous()" class="btn btn-outline-primary fw-bold" th:href="@{/login}">Đăng nhập để đăng ký</a>
                        <a sec:authorize="hasRole('ADMIN')" class="btn btn-warning fw-bold" th:href="@{/admin/courses/edit/{id}(id=${c.id})}">Quản lý</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-5" th:if="${coursePage.totalPages > 1}">
        <ul class="pagination justify-content-center shadow-sm d-inline-flex p-2 bg-white rounded">
            <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
                <a class="page-link border-0" th:href="@{/home(page=${coursePage.number-1}, q=${q})}">&laquo;</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, coursePage.totalPages-1)}"
                th:classappend="${i == coursePage.number} ? 'active'">
                <a class="page-link border-0" th:href="@{/home(page=${i}, q=${q})}" th:text="${i+1}">1</a>
            </li>

            <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
                <a class="page-link border-0" th:href="@{/home(page=${coursePage.number+1}, q=${q})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
