spring.application.name=bai4_qlsp

# MySQL connection (XAMPP: user root, empty password)
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee_bai05?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Auto create/update tables from entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MySQL dialect for XAMPP
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
