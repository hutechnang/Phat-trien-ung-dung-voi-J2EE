<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Không có quyền truy cập</title>
</head>
<body>
<div layout:fragment="content" class="container text-center py-5">
    <div class="alert alert-danger" role="alert">
        <h2 class="alert-heading">Không có quyền truy cập</h2>
        <p>Tài khoản của bạn không có quyền thực hiện thao tác này.</p>
        <hr>
        <a th:href="@{/products}" class="btn btn-primary">Quay lại danh sách sản phẩm</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-secondary">Đăng xuất</button>
        </form>
    </div>
</div>
</body>
</html>
